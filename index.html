<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        input { padding: 10px; width: 250px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; }
        button { padding: 10px 20px; background: #ff4444; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Add HWID:Username</h2>
    <input type="text" id="inputData" placeholder="HWID:Username">
    <button onclick="addToSheet()">Submit</button>
    <p id="status"></p>

    <script>
        function addToSheet() {
            const input = document.getElementById('inputData').value;
            const status = document.getElementById('status');
            const [hwid, user] = input.split(':');
            
            if(!hwid || !user) {
                status.innerText = "Error: Use HWID:Username";
                return;
            }

            status.innerText = "Sending...";

            // REPLACE THIS URL WITH YOUR GOOGLE EXEC URL
            const webAppUrl = "https://script.google.com/macros/s/AKfycbxyGpyNSN2TTkglNBUJUYR0RMK_IGK5atqRwnBVvOFjq9wTatO7kLtQTJWr-FbVPO264w/exec";
            
            // This sends the data to your Google Sheet
            fetch(`${webAppUrl}?hwid=${hwid}&user=${user}`, {
                mode: 'no-cors' // This is required for Google Script redirects
            }).then(() => {
                status.innerText = "Successfully added!";
                document.getElementById('inputData').value = "";
            }).catch(() => {
                status.innerText = "Error connecting to Google.";
            });
        }
    </script>
</body>
</html>
